<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory PRO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start">
  <h1>Memory PRO 🧠🔥</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="game">
  <h2 id="level"></h2>
  <h3 id="timer"></h3>

  <div id="items"></div>
  <div id="options"></div>

  <p id="result"></p>
  <p id="score"></p>

  <button id="shareBtn" onclick="shareScore()">Share 📲</button>
</div>

<audio id="boom" src="boom.mp3"></audio>
<canvas id="canvas"></canvas>

<script src="script.js"></script>
</body>
</html>
