<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk or Reward PRO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start">
  <h1>Risk or Reward PRO 😈🔥</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="game">
  <h2 id="question"></h2>
  <h3 id="timer"></h3>

  <div class="btns">
    <button class="safe" onclick="choose('safe')">SAFE</button>
    <button class="risk" onclick="choose('risk')">RISK</button>
  </div>

  <p id="result"></p>
  <p id="score"></p>

  <button id="shareBtn" onclick="shareScore()">Share 📲</button>
</div>

<audio id="boom" src="boom.mp3"></audio>
<canvas id="canvas"></canvas>

<script src="script.js"></script>
</body>
</html>
